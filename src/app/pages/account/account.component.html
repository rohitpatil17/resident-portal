<!-- src/app/pages/account/account.component.html -->

<div class="account-page">
  <div class="card animate" style="max-width: 700px">
    <div class="account-row" *ngFor="let section of sections">
      <div class="row-info">
        <div class="row-title">{{ section.title }}</div>
        <div class="row-desc">{{ section.description }}</div>
      </div>
      <button
        class="btn-view"
        [class.disabled]="section.disabled"
        [disabled]="section.disabled"
        (click)="viewSection(section)">
        View
      </button>
    </div>
  </div>
</div>
