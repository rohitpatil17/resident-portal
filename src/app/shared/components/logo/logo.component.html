<!-- src/app/shared/components/logo/logo.component.html -->

<div class="ma-logo">
  <div class="ma-logo-row">
    <span class="ma-word" [class]="theme" [class.lg]="size === 'lg'" [class.sm]="size === 'sm'">Manage</span>

    <!-- Double-house icon — exact ManageAmerica brand icon -->
    <span class="ma-icon">
      <svg
        [attr.width]="size === 'lg' ? 40 : 24"
        [attr.height]="size === 'lg' ? 36 : 22"
        viewBox="0 0 56 50"
        fill="none"
        xmlns="http://www.w3.org/2000/svg">

        <!-- Back house (slightly offset right) -->
        <path
          d="M18 24V44H30V34H38V44H50V24L34 8L18 24Z"
          fill="#A5A8D8"
          fill-opacity="0.45"
          stroke="#A5A8D8"
          stroke-width="2.5"
          stroke-linejoin="round"/>

        <!-- Front house -->
        <path
          d="M6 26V44H18V34H26V44H38V26L22 10L6 26Z"
          fill="white"
          fill-opacity="0.0"
          stroke="#7B7FC4"
          stroke-width="2.8"
          stroke-linejoin="round"/>

        <!-- Front house fill -->
        <path
          d="M6 26V44H18V34H26V44H38V26L22 10L6 26Z"
          fill="#7B7FC4"
          fill-opacity="0.18"/>

        <!-- Door on front house -->
        <rect x="19" y="34" width="6" height="10" rx="1" fill="#7B7FC4" fill-opacity="0.6"/>
      </svg>
    </span>

    <span class="ma-word" [class]="theme" [class.lg]="size === 'lg'" [class.sm]="size === 'sm'">America</span>
  </div>

  <span class="ma-sub" [class]="theme" [class.lg]="size === 'lg'" [class.sm]="size === 'sm'">
    {{ size === 'lg' ? 'Property Management Platform' : 'Resident Portal' }}
  </span>
</div>
